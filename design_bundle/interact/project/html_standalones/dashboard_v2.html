<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Dashboard v2</title>
<style>
  body { font-family: system-ui, sans-serif; margin:0; background:#f4f4f5; padding:24px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; max-width:900px; margin:0 auto; }
  .stat { background:white; padding:20px; border-radius:10px; border:1px solid #e4e4e7; }
  .num { font-size:32px; font-weight:600; }
  .lbl { color:#71717a; font-size:13px; }
</style>
</head>
<body>
<h2 style="max-width:900px;margin:0 auto 20px">Analytics</h2>
<div class="grid">
<div class="stat"><div class="num">2,847</div><div class="lbl">Active users</div></div>
<div class="stat"><div class="num">$18.2k</div><div class="lbl">Revenue</div></div>
<div class="stat"><div class="num">94%</div><div class="lbl">Retention</div></div>
</div>
</body>
</html>
