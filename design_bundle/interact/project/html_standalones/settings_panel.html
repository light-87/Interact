<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Settings</title>
<style>
  body { font-family:system-ui,sans-serif; margin:0; padding:32px; background:#fafafa; }
  .panel { max-width:560px; margin:0 auto; background:white; border-radius:12px; border:1px solid #eee; }
  .row { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid #f0f0f0; }
  .row:last-child { border-bottom:0; }
  .toggle { width:40px; height:24px; background:#1a1a1a; border-radius:999px; position:relative; }
  .toggle::after { content:''; position:absolute; right:3px; top:3px; width:18px; height:18px; background:white; border-radius:50%; }
  .toggle.off { background:#ddd; }
  .toggle.off::after { left:3px; right:auto; }
</style>
</head>
<body>
<h2 style="max-width:560px;margin:0 auto 16px">Settings</h2>
<div class="panel">
<div class="row"><span>Email notifications</span><div class="toggle"></div></div>
<div class="row"><span>Weekly digest</span><div class="toggle"></div></div>
<div class="row"><span>Product updates</span><div class="toggle off"></div></div>
<div class="row"><span>Marketing emails</span><div class="toggle off"></div></div>
</div>
</body>
</html>
