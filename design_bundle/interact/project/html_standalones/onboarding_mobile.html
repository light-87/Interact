<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Mobile Onboarding</title>
<style>
  body { margin:0; font-family:-apple-system,sans-serif; background:linear-gradient(180deg,#fef3c7,#fde68a); height:100vh; display:flex; flex-direction:column; justify-content:flex-end; padding:32px; box-sizing:border-box; }
  h1 { font-size:36px; margin:0 0 12px; }
  p { color:#78716c; margin:0 0 32px; line-height:1.5; }
  .dots { display:flex; gap:6px; margin-bottom:24px; }
  .dot { width:8px; height:8px; border-radius:50%; background:rgba(0,0,0,.2); }
  .dot.active { background:#1a1a1a; width:24px; border-radius:4px; }
  button { padding:16px; background:#1a1a1a; color:white; border:0; border-radius:12px; font-size:16px; }
</style>
</head>
<body>
<div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
<h1>Track habits<br/>that matter.</h1>
<p>Build routines that stick with gentle daily nudges.</p>
<button>Continue</button>
</body>
</html>
