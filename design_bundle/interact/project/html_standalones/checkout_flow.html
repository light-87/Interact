<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Checkout Flow</title>
<style>
  body { font-family: Georgia, serif; margin:0; padding:48px; background:#faf7f2; color:#1a1a1a; }
  .box { max-width:480px; margin:0 auto; background:white; padding:32px; border-radius:12px; box-shadow:0 2px 24px rgba(0,0,0,.06); }
  h1 { margin:0 0 24px; }
  input { width:100%; padding:12px; font-size:15px; border:1px solid #ddd; border-radius:6px; margin-bottom:12px; box-sizing:border-box; }
  button { width:100%; padding:14px; background:#1a1a1a; color:white; border:0; border-radius:6px; font-size:15px; cursor:pointer; }
</style>
</head>
<body>
<div class="box">
<h1>Checkout</h1>
<input placeholder="Card number"/>
<input placeholder="Name on card"/>
<button>Pay $42.00</button>
</div>
</body>
</html>
