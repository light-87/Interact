<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Demo Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #f5efe4;
    --paper: #faf6ed;
    --ink: #1a1613;
    --muted: #78695a;
    --rule: #d9cfbd;
    --accent: #8b3a1f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--ivory); color: var(--ink); font-family: "IBM Plex Mono", ui-monospace, monospace; overflow: hidden; }

  .viewer {
    position: fixed; inset: 0;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  .viewer-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 14px 22px;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    position: relative;
    z-index: 2;
  }
  .viewer-bar::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -4px; height: 3px;
    background: linear-gradient(180deg, rgba(26,22,19,.06), transparent);
    pointer-events: none;
  }

  .back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--ink);
    padding: 6px 10px 6px 6px;
    border: 1px solid transparent;
    border-radius: 2px;
    transition: background .15s, border-color .15s;
    font-weight: 500;
  }
  .back:hover { background: var(--ivory); border-color: var(--rule); }
  .back svg { width: 14px; height: 14px; color: var(--accent); }

  .crumbs {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .crumb-label {
    color: var(--muted);
  }
  .crumb-title {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-size: 20px;
    color: var(--ink);
    text-transform: none;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .crumb-file {
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
  }
  .crumb-file::before { content: "·"; margin: 0 8px; }

  .viewer-actions { display: flex; gap: 8px; }
  .btn {
    font: inherit;
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    padding: 7px 14px;
    cursor: pointer;
    border-radius: 2px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .15s, border-color .15s;
  }
  .btn:hover { background: var(--ivory); border-color: var(--ink); }
  .btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn svg { width: 12px; height: 12px; }

  .stage {
    position: relative;
    background: #fff;
    overflow: hidden;
  }
  .stage iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: 0;
    background: white;
  }

  .toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--paper);
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 10px 18px;
    border-radius: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 10;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  /* not found */
  .missing {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    background: var(--ivory);
    padding: 24px;
    text-align: center;
  }
  .missing h2 {
    font-family: "Fraunces", serif; font-style: italic; font-weight: 400;
    font-size: 40px; margin: 0 0 12px; color: var(--ink);
  }
  .missing p { color: var(--muted); max-width: 420px; margin: 0 auto 24px; line-height: 1.6; font-size: 14px; }
  .missing code { background: var(--paper); border: 1px solid var(--rule); padding: 2px 6px; color: var(--accent); font-size: 12px; }
</style>
</head>
<body>

<div class="viewer">
  <div class="viewer-bar">
    <a class="back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      <span>Catalogue</span>
    </a>

    <div class="crumbs">
      <span class="crumb-label">Viewing</span>
      <span class="crumb-title" id="title">—</span>
      <span class="crumb-file" id="filename"></span>
    </div>

    <div class="viewer-actions">
      <button class="btn" id="copyBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        Copy link
      </button>
      <a class="btn primary" id="openBtn" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7"/><path d="M8 7h9v9"/></svg>
        Open standalone
      </a>
    </div>
  </div>

  <div class="stage" id="stage">
    <!-- iframe or missing state injected here -->
  </div>
</div>

<div class="toast" id="toast">Link copied</div>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  const file = params.get("f") || "";
  const safe = /^[\w.\-]+\.html?$/i.test(file);

  const titleEl = document.getElementById("title");
  const fileEl = document.getElementById("filename");
  const stage = document.getElementById("stage");
  const openBtn = document.getElementById("openBtn");
  const copyBtn = document.getElementById("copyBtn");
  const toast = document.getElementById("toast");

  function toTitle(fn) {
    return fn.replace(/\.html?$/i, "").replace(/[_-]+/g, " ")
      .replace(/\s+/g, " ").trim()
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  if (!file || !safe) {
    titleEl.textContent = "Not found";
    fileEl.textContent = "";
    stage.innerHTML = `
      <div class="missing">
        <div>
          <h2>No demo specified</h2>
          <p>Open a demo from the <a href="index.html">catalogue</a>, or append <code>?f=filename.html</code> to the URL.</p>
          <a class="btn" href="index.html">Back to catalogue</a>
        </div>
      </div>`;
    return;
  }

  const src = "html_standalones/" + file;
  titleEl.textContent = toTitle(file);
  fileEl.textContent = file;
  document.title = toTitle(file) + " — Demos";
  openBtn.href = src;

  const iframe = document.createElement("iframe");
  iframe.src = src;
  iframe.setAttribute("title", toTitle(file));
  iframe.setAttribute("sandbox", "allow-scripts allow-forms allow-popups allow-modals allow-same-origin");
  stage.appendChild(iframe);

  copyBtn.addEventListener("click", () => {
    const url = location.href;
    navigator.clipboard && navigator.clipboard.writeText(url).then(() => {
      toast.textContent = "Link copied";
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1400);
    });
  });
})();
</script>

</body>
</html>
